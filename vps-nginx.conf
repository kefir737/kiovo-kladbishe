# System Nginx config for kladbishe-kiovo.ru
# Place this file at: /etc/nginx/sites-available/kladbishe-kiovo.ru
# Then: ln -s /etc/nginx/sites-available/kladbishe-kiovo.ru /etc/nginx/sites-enabled/
# And: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name kladbishe-kiovo.ru www.kladbishe-kiovo.ru;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kladbishe-kiovo.ru www.kladbishe-kiovo.ru;

    # SSL certificates (update path if using different cert)
    ssl_certificate /etc/letsencrypt/live/kladbishe-kiovo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kladbishe-kiovo.ru/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Docker container on port 8082
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check (optional)
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
