services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiovo-kladbishe-backend
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app/cms.db:/app/cms.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/content"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kiovo-kladbishe-frontend
    depends_on:
      - backend
    ports:
      - "8082:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
