services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kiovo-kladbishe-frontend
    ports:
      - "8082:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
